# Auto release: code push to main waits 10 minutes (a newer push cancels and
# restarts the timer via concurrency), bumps the patch version from the latest
# tag, then dispatches build-release.yml which builds, signs, notarizes and
# publishes the release. Manual dispatch allows minor/major bumps and skips the wait.
# GITHUB_TOKEN-initiated workflow_dispatch is exempt from GitHub's recursive-run
# prevention, so the dispatch chain works without a PAT.
name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: auto-release
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  dispatch-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - name: Wait 10 minutes for more commits
        if: github.event_name == 'push'
        run: sleep 600

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # HEAD already released -> nothing to do (e.g. re-run after a release commit).
          if git describe --tags --exact-match --match 'v*' HEAD >/dev/null 2>&1; then
            echo "HEAD is already tagged; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUMP="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Dispatch build-release workflow
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f version="${{ steps.version.outputs.new_version }}"
          echo "Dispatched build-release.yml with version ${{ steps.version.outputs.new_version }}"
