# Mac App Store pipeline: build sandboxed variant (build-mas.zsh) -> sign with
# Apple Distribution -> productbuild .pkg with the installer identity ->
# upload to App Store Connect -> (optional) push metadata/screenshots with
# fastlane deliver.
#
# Manual-only on purpose: MAS releases go through App Review, so they follow a
# slower cadence than the auto-released direct channel and the version must be
# chosen consciously (App Store Connect only accepts monotonically increasing
# CFBundleVersion values; re-uploading the same version is rejected at ingest).
#
# Required secrets:
#   CCTRANS_MAS_APP_CERTIFICATE_BASE64        Apple Distribution .p12 (base64)
#   CCTRANS_MAS_INSTALLER_CERTIFICATE_BASE64  Mac Installer Distribution .p12 (base64)
#   CCTRANS_MAS_P12_PASSWORD                  password for both .p12 files
#   CCTRANS_MAS_PROFILE_BASE64                Mac App Store provisioning profile, main app (base64)
#   CCTRANS_MAS_HELPER_PROFILE_BASE64         Mac App Store provisioning profile, Tauri helper (base64)
#   APPLE_TEAM_ID / KEYCHAIN_PASSWORD         shared with build-release.yml
# Upload auth, either pair (API key wins when both exist):
#   ASC_API_KEY_ID + ASC_API_ISSUER_ID + ASC_API_KEY_P8   App Store Connect API key (.p8 contents)
#   APPLE_ID + APPLE_APP_PASSWORD                          fallback: app-specific password
name: Mac App Store Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version to submit (e.g. 0.3.0, no leading v). Must be higher than any version previously uploaded to App Store Connect.'
        required: true
      upload_metadata:
        description: 'Also push fastlane/metadata + screenshots to App Store Connect (needs the ASC API key secrets).'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-mas

jobs:
  build-upload:
    # Same toolchain constraint as build-release.yml: Swift 6.2 needs Xcode 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Mac App Store certificates
        env:
          APP_CERT_BASE64: ${{ secrets.CCTRANS_MAS_APP_CERTIFICATE_BASE64 }}
          INSTALLER_CERT_BASE64: ${{ secrets.CCTRANS_MAS_INSTALLER_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.CCTRANS_MAS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/mas-signing.keychain-db"
          echo -n "$APP_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/mas_app.p12"
          echo -n "$INSTALLER_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/mas_installer.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/mas_app.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/mas_installer.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Resolve the exact identity strings from the imported certs so the
          # workflow does not hard-code the account holder's name. The installer
          # cert is not a codesigning identity, so query without -p codesigning.
          APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(Apple Distribution: [^"]*\)".*/\1/p' | head -n 1)
          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(3rd Party Mac Developer Installer: [^"]*\)".*/\1/p' | head -n 1)
          # Newer Apple portal issues the same role under a renamed CN.
          if [[ -z "$INSTALLER_IDENTITY" ]]; then
            INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" \
              | sed -n 's/.*"\(Mac Installer Distribution: [^"]*\)".*/\1/p' | head -n 1)
          fi
          if [[ -z "$APP_IDENTITY" || -z "$INSTALLER_IDENTITY" ]]; then
            echo "Could not resolve signing identities from the imported certificates:" >&2
            security find-identity -v "$KEYCHAIN_PATH" >&2
            exit 1
          fi
          echo "MAS_SIGN_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV"
          echo "MAS_INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"

      - name: Write provisioning profiles
        env:
          PROFILE_BASE64: ${{ secrets.CCTRANS_MAS_PROFILE_BASE64 }}
          HELPER_PROFILE_BASE64: ${{ secrets.CCTRANS_MAS_HELPER_PROFILE_BASE64 }}
        run: |
          if [[ -z "$PROFILE_BASE64" || -z "$HELPER_PROFILE_BASE64" ]]; then
            echo "CCTRANS_MAS_PROFILE_BASE64 / CCTRANS_MAS_HELPER_PROFILE_BASE64 secrets are missing." >&2
            echo "Create both Mac App Store provisioning profiles on developer.apple.com first." >&2
            exit 1
          fi
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cctrans-mas.provisionprofile"
          echo -n "$HELPER_PROFILE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cctrans-mas-helper.provisionprofile"

      - name: Build, sign and package
        env:
          CCTRANS_VERSION: ${{ inputs.version }}
          CCTRANS_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CCTRANS_MAS_SIGN_IDENTITY: ${{ env.MAS_SIGN_IDENTITY }}
          CCTRANS_MAS_INSTALLER_IDENTITY: ${{ env.MAS_INSTALLER_IDENTITY }}
        run: |
          CCTRANS_MAS_PROFILE="$RUNNER_TEMP/cctrans-mas.provisionprofile" \
          CCTRANS_MAS_HELPER_PROFILE="$RUNNER_TEMP/cctrans-mas-helper.provisionprofile" \
          ./scripts/build-mas.zsh

      - name: Verify sandbox entitlements
        run: |
          # Fail here instead of at App Store Connect ingest: every executable
          # must carry com.apple.security.app-sandbox (guideline 2.4.5).
          for BUNDLE in dist-mas/CCTrans.app dist-mas/CCTrans.app/Contents/Resources/CCTransTauri.app; do
            if ! codesign -d --entitlements - "$BUNDLE" 2>/dev/null | grep -q 'com.apple.security.app-sandbox'; then
              echo "Missing app-sandbox entitlement on $BUNDLE" >&2
              codesign -d --entitlements - "$BUNDLE" >&2 || true
              exit 1
            fi
          done
          codesign --verify --deep --strict dist-mas/CCTrans.app
          ls -la "dist-mas/CCTrans-mas-${{ inputs.version }}.pkg"

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          PKG="dist-mas/CCTrans-mas-${{ inputs.version }}.pkg"
          if [[ -n "$ASC_API_KEY_ID" && -n "$ASC_API_ISSUER_ID" && -n "$ASC_API_KEY_P8" ]]; then
            # altool resolves API keys from ./private_keys (among other dirs).
            mkdir -p private_keys
            printf '%s\n' "$ASC_API_KEY_P8" > "private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
            xcrun altool --upload-app -f "$PKG" -t macos \
              --apiKey "$ASC_API_KEY_ID" --apiIssuer "$ASC_API_ISSUER_ID"
            rm -rf private_keys
          elif [[ -n "$APPLE_ID" && -n "$APPLE_APP_PASSWORD" ]]; then
            xcrun altool --upload-app -f "$PKG" -t macos \
              -u "$APPLE_ID" -p "$APPLE_APP_PASSWORD"
          else
            echo "No App Store Connect credentials: set ASC_API_KEY_* or APPLE_ID/APPLE_APP_PASSWORD secrets." >&2
            exit 1
          fi

      - name: Keep the uploaded pkg as a run artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCTrans-mas-${{ inputs.version }}
          path: dist-mas/CCTrans-mas-${{ inputs.version }}.pkg
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/mas-signing.keychain-db" 2>/dev/null || true

  # Pushes fastlane/metadata (descriptions, keywords, URLs, review notes) and
  # fastlane/screenshots to the App Store Connect version. Separate job so a
  # metadata typo never invalidates a finished binary upload.
  metadata:
    if: ${{ inputs.upload_metadata }}
    needs: build-upload
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Push metadata with fastlane deliver
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          if [[ -z "$ASC_API_KEY_ID" || -z "$ASC_API_ISSUER_ID" || -z "$ASC_API_KEY_P8" ]]; then
            echo "Metadata upload needs the ASC API key secrets (app-specific passwords cannot edit metadata)." >&2
            exit 1
          fi
          # fastlane api_key_path JSON wants the key inline, newlines escaped.
          KEY_JSON="$RUNNER_TEMP/asc_api_key.json"
          python3 - "$KEY_JSON" <<'PY'
          import json, os, sys
          json.dump({
              "key_id": os.environ["ASC_API_KEY_ID"],
              "issuer_id": os.environ["ASC_API_ISSUER_ID"],
              "key": os.environ["ASC_API_KEY_P8"],
              "in_house": False,
          }, open(sys.argv[1], "w"))
          PY
          gem install fastlane --no-document
          fastlane deliver --api_key_path "$KEY_JSON" \
            --app_identifier as.kargn.cctrans \
            --platform osx \
            --app_version "${{ inputs.version }}" \
            --skip_binary_upload true \
            --force true
          rm -f "$KEY_JSON"
