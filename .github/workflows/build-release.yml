# Release pipeline: build (SwiftPM + Tauri) -> Developer ID sign -> notarize ->
# DMG -> Sparkle EdDSA sign -> appcast.xml -> GitHub Release.
# The Sparkle feed URL baked into Info.plist points at
# releases/latest/download/appcast.xml, so every release must upload appcast.xml.
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.2.0). The tag must already exist or will be created by the release step.'
        required: true

permissions:
  contents: write

# Serialize release builds so two auto-release dispatches cannot interleave.
concurrency:
  group: build-release

jobs:
  release:
    # Swift tools-version 6.2 requires the Xcode 26 toolchain, only present on macos-26 images.
    runs-on: macos-26
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            # A queued dispatch may carry a version another run already released;
            # fail fast instead of silently overwriting that release's assets.
            if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
              echo "Tag $VERSION already exists; refusing to overwrite. Re-run with a new version." >&2
              exit 1
            fi
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_VERSION=${VERSION#v}" >> "$GITHUB_ENV"
          echo "DMG_NAME=CCTrans-${VERSION}.dmg" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build, bundle and sign app
        env:
          CCTRANS_VERSION: ${{ env.APP_VERSION }}
          CCTRANS_HARDENED_RUNTIME: '1'
          CCTRANS_CODE_SIGN_IDENTITY: 'Developer ID Application'
        run: ./scripts/build-app.zsh

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent dist/CCTrans.app "$RUNNER_TEMP/CCTrans-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/CCTrans-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m
          xcrun stapler staple dist/CCTrans.app

      - name: Create DMG
        run: |
          # Stage only the app; the raw export dir would leak build artifacts into the DMG.
          DMG_STAGING="$RUNNER_TEMP/dmg_staging"
          mkdir -p "$DMG_STAGING"
          cp -R dist/CCTrans.app "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "CCTrans" \
            -srcfolder "$DMG_STAGING" -ov -format UDZO "$DMG_NAME"
          codesign --force --sign "Developer ID Application" "$DMG_NAME"
          rm -rf "$DMG_STAGING"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$DMG_NAME"

      - name: Generate Sparkle signature and appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -sL -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          mkdir -p sparkle
          tar -xf sparkle.tar.xz -C sparkle
          chmod +x sparkle/bin/*

          DOWNLOAD_URL="https://github.com/kargnas/cctrans/releases/download/${VERSION}/${DMG_NAME}"

          echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          # sign_update prints: sparkle:edSignature="<SIG>" length="<LEN>" -- extract the signature only.
          FULL_OUTPUT=$(./sparkle/bin/sign_update "$DMG_NAME" --ed-key-file "$RUNNER_TEMP/sparkle_key")
          SIGNATURE=$(echo "$FULL_OUTPUT" | awk -F '"' '{print $2}')
          DMG_SIZE=$(stat -f%z "$DMG_NAME")

          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
            '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">' \
            '  <channel>' \
            '    <title>CCTrans Updates</title>' \
            '    <link>https://github.com/kargnas/cctrans/releases/latest/download/appcast.xml</link>' \
            '    <description>Most recent changes with links to updates.</description>' \
            '    <language>en</language>' \
            '    <item>' \
            "      <title>Version ${APP_VERSION}</title>" \
            "      <pubDate>$(date -R)</pubDate>" \
            "      <sparkle:version>${APP_VERSION}</sparkle:version>" \
            "      <sparkle:shortVersionString>${APP_VERSION}</sparkle:shortVersionString>" \
            '      <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>' \
            "      <enclosure url=\"${DOWNLOAD_URL}\"" \
            "                 sparkle:edSignature=\"${SIGNATURE}\"" \
            "                 length=\"${DMG_SIZE}\"" \
            '                 type="application/octet-stream"/>' \
            "      <sparkle:releaseNotesLink>https://github.com/kargnas/cctrans/releases/tag/${VERSION}</sparkle:releaseNotesLink>" \
            '    </item>' \
            '  </channel>' \
            '</rss>' > appcast.xml

          rm -f "$RUNNER_TEMP/sparkle_key"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            CCTrans-*.dmg
            appcast.xml
          generate_release_notes: true

  # Bump the Homebrew cask in kargnas/homebrew-tap so `brew install --cask
  # kargnas/tap/cctrans` always resolves to the DMG this run just published.
  # Uses a write deploy key (TAP_SSH_KEY) because GITHUB_TOKEN cannot push to
  # another repository.
  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap cask
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_SSH_KEY: ${{ secrets.TAP_SSH_KEY }}
        run: |
          set -euo pipefail
          APP_VERSION="${VERSION#v}"

          curl -fsSL -o cctrans.dmg \
            "https://github.com/kargnas/cctrans/releases/download/${VERSION}/CCTrans-${VERSION}.dmg"
          SHA256=$(sha256sum cctrans.dmg | cut -d' ' -f1)

          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_SSH_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"

          git clone --depth 1 git@github.com:kargnas/homebrew-tap.git tap
          # The cask structure lives in the tap repo; this job only bumps the
          # version and sha256 lines so the two repos do not drift.
          sed -i -E "s|^  version \".*\"$|  version \"${APP_VERSION}\"|" tap/Casks/cctrans.rb
          sed -i -E "s|^  sha256 \".*\"$|  sha256 \"${SHA256}\"|" tap/Casks/cctrans.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/cctrans.rb
          # A re-run of an already-published version produces no diff; skip the
          # empty commit instead of failing the job.
          git diff --cached --quiet || {
            git commit -m "cctrans ${APP_VERSION}"
            git push origin HEAD:main
          }
